<svg viewBox="0 0 720 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="helmet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#a7ebf2"/><stop offset="1" stop-color="#2bb8cf"/>
  </linearGradient>
  <linearGradient id="scoot" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#9ee7f0"/><stop offset="1" stop-color="#1fa3c0"/>
  </linearGradient>
  <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffd24d"/><stop offset="1" stop-color="#f59b12"/>
  </linearGradient>
  <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffc266"/><stop offset="1" stop-color="#ff8f24"/>
  </linearGradient>
  <radialGradient id="rim" cx="0.4" cy="0.35" r="0.75">
    <stop offset="0" stop-color="#eef2f4"/><stop offset="1" stop-color="#9fb0b6"/>
  </radialGradient>
</defs>

<g stroke="#2b3a40" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">

  <!-- 地面陰影 -->
  <ellipse cx="370" cy="574" rx="255" ry="22" fill="#000000" opacity="0.12" stroke="none"/>

  <!-- 排氣煙 -->
  <g fill="#ffffff" stroke="#dfeef0" stroke-width="4">
    <circle cx="616" cy="522" r="19"/><circle cx="644" cy="527" r="13"/><circle cx="630" cy="507" r="14"/>
  </g>

  <!-- 外送箱（後架頂箱）-->
  <rect x="472" y="372" width="86" height="20" rx="9" fill="#2f2a32"/>
  <line x1="500" y1="392" x2="502" y2="432" stroke="#2f2a32" stroke-width="12"/>
  <polygon points="472,266 498,242 602,242 576,266" fill="#ffdf7a"/>
  <polygon points="576,266 602,242 602,360 576,384" fill="#e08a08"/>
  <rect x="472" y="266" width="104" height="118" rx="14" fill="url(#box)"/>
  <circle cx="524" cy="322" r="24" fill="#fff7e0" stroke="#e08a08" stroke-width="5"/>
  <path d="M512 322 l8 9 l16 -19" fill="none" stroke="#f59b12" stroke-width="6"/>

  <!-- 排氣管 -->
  <rect x="540" y="488" width="118" height="24" rx="12" fill="#d7dee2"/>
  <circle cx="656" cy="500" r="9" fill="#8a949a" stroke="none"/>

  <!-- 機車車身（速可達）-->
  <!-- 後側板 -->
  <path d="M356 480 L359 416 Q363 372 420 370 Q522 368 568 408 Q606 442 593 486 Q587 510 556 510 L380 510 Q356 508 356 480 Z" fill="url(#scoot)"/>
  <!-- 前腿護板 + 踏墊基座 -->
  <path d="M362 478 L214 478 Q194 478 194 452 L214 370 Q220 344 250 348 Q280 352 282 388 L278 478 Z" fill="url(#scoot)"/>
  <!-- 前土除 -->
  <path d="M120 488 Q120 416 186 410 Q254 414 254 488 Z" fill="url(#scoot)"/>
  <!-- 踏墊（腳踏板）-->
  <rect x="208" y="470" width="172" height="22" rx="9" fill="#27424a"/>
  <!-- 座墊 -->
  <path d="M352 392 Q360 370 412 370 L472 372 Q490 374 487 396 L480 412 Q400 416 360 411 Q344 406 352 392 Z" fill="#3a2f33"/>
  <!-- 車身亮面 -->
  <path d="M384 432 Q470 418 556 438" fill="none" stroke="#ffffff" stroke-width="9" opacity="0.4" stroke-linecap="round"/>

  <!-- 輪子 -->
  <circle cx="186" cy="500" r="60" fill="#33323a"/>
  <circle cx="186" cy="500" r="30" fill="url(#rim)"/>
  <circle cx="186" cy="500" r="10" fill="#7e8a90" stroke="none"/>
  <circle cx="516" cy="500" r="60" fill="#33323a"/>
  <circle cx="516" cy="500" r="30" fill="url(#rim)"/>
  <circle cx="516" cy="500" r="10" fill="#7e8a90" stroke="none"/>

  <!-- 大燈 -->
  <circle cx="206" cy="394" r="21" fill="#ffe48a"/>
  <circle cx="201" cy="389" r="7" fill="#ffffff" stroke="none" opacity="0.85"/>

  <!-- 龍頭 + 雙後照鏡 -->
  <line x1="252" y1="358" x2="234" y2="300" stroke="#2b3a40" stroke-width="10"/>
  <line x1="238" y1="306" x2="214" y2="278" stroke="#2b3a40" stroke-width="6"/>
  <line x1="238" y1="306" x2="266" y2="284" stroke="#2b3a40" stroke-width="6"/>
  <ellipse cx="208" cy="272" rx="12" ry="15" fill="#bfe9f2"/>
  <ellipse cx="272" cy="278" rx="12" ry="15" fill="#bfe9f2"/>
  <line x1="222" y1="354" x2="272" y2="368" stroke="#2b3a40" stroke-width="13"/>
  <circle cx="216" cy="352" r="11" fill="#2b3a40"/>

  <!-- 騎士：近腿 -->
  <path d="M404 406 Q362 432 332 454 L304 476" fill="none" stroke="#3a4a72" stroke-width="34"/>
  <!-- 鞋子（精緻球鞋）-->
  <path d="M264 474 Q262 452 286 453 L318 457 Q333 460 333 474 L333 480 L264 480 Z" fill="#ff5e5e"/>
  <rect x="256" y="478" width="86" height="14" rx="7" fill="#ffffff"/>
  <path d="M258 480 Q256 470 268 469 L292 470 L290 480 Z" fill="#ffffff"/>
  <path d="M300 459 l-7 14 M313 461 l-7 14" stroke="#ffffff" stroke-width="3"/>
  <line x1="262" y1="486" x2="336" y2="486" stroke="#d3dadf" stroke-width="2"/>
  <!-- 身體（橘上衣）-->
  <path d="M340 394 Q324 320 368 308 L412 314 Q432 386 406 402 Z" fill="url(#shirt)"/>
  <!-- 手臂 -->
  <path d="M374 328 Q300 330 234 354" fill="none" stroke="url(#shirt)" stroke-width="30"/>
  <circle cx="228" cy="354" r="19" fill="#ffe2c6"/>
  <!-- 頭 -->
  <path d="M272 198 Q272 288 342 288 Q412 288 412 198 Z" fill="#ffe2c6"/>
  <!-- 頭髮 -->
  <path d="M280 194 Q292 164 322 170 Q352 154 384 178 Q374 190 342 186 Q308 196 280 204 Z" fill="#4a3b32"/>
  <!-- 安全帽 -->
  <path d="M234 190 a108 108 0 0 1 216 0 Z" fill="url(#helmet)"/>
  <rect x="228" y="186" width="228" height="26" rx="13" fill="#eafcff"/>
  <path d="M322 88 q20 -6 40 0 l-6 98 q-14 4 -28 0 Z" fill="#ffffff" opacity="0.9" stroke="none"/>
  <ellipse cx="292" cy="132" rx="28" ry="46" fill="#ffffff" opacity="0.32" stroke="none"/>
  <!-- 五官 -->
  <path d="M303 214 q14 -7 28 -1" fill="none" stroke="#4a3b32" stroke-width="5"/>
  <path d="M361 213 q14 -6 28 1" fill="none" stroke="#4a3b32" stroke-width="5"/>
  <ellipse cx="318" cy="236" rx="15" ry="19" fill="#3b2b24" stroke="none"/>
  <ellipse cx="374" cy="236" rx="15" ry="19" fill="#3b2b24" stroke="none"/>
  <circle cx="323" cy="230" r="5" fill="#fff" stroke="none"/>
  <circle cx="379" cy="230" r="5" fill="#fff" stroke="none"/>
  <circle cx="294" cy="258" r="11" fill="#ff9eb0" stroke="none" opacity="0.8"/>
  <circle cx="398" cy="258" r="11" fill="#ff9eb0" stroke="none" opacity="0.8"/>
  <path d="M334 262 Q346 276 358 262" fill="none" stroke="#3b2b24" stroke-width="5"/>
</g>
</svg>
